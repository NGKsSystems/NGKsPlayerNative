out_dir = "build_graph"
warnings = "default"

cxx_std = 17
include_dirs = ["src", "third_party/JUCE/modules"]
# NOTE: Global defines here do NOT set the active profile. Profile-specific defines
# (DEBUG/_DEBUG for debug, NDEBUG for release) are set in [profiles.debug] / [profiles.release].
# DEFAULT PROFILE IS RELEASE. Use --profile release (or run_native_release verb).
defines = [
  "JUCE_GLOBAL_MODULE_SETTINGS_INCLUDED=1",
  "JUCE_MODULE_AVAILABLE_juce_audio_basics=1",
  "JUCE_MODULE_AVAILABLE_juce_audio_devices=1",
  "JUCE_MODULE_AVAILABLE_juce_audio_formats=1",
  "JUCE_MODULE_AVAILABLE_juce_core=1",

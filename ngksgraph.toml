  "JUCE_MODULE_AVAILABLE_juce_events=1",
]
cflags = ["/EHsc", "/FS", "/Zc:__cplusplus", "/bigobj", "/permissive-"]
ldflags = []
libs = []
lib_dirs = []

[build]
# Canonical names for first app:
#   native   = GUI app (src/ui/main.cpp)
#   headless = headless harness (tools/headless_main.cpp)
#   smoke    = smoke harness (tools/state_machine_smoke.cpp)
default_target = "native"

[snapshots]
enabled = true
keep = 10
write_compdb = true
write_ninja = false
write_config = true

[profiles.debug]
cflags = ["/FS", "/MDd", "/Od", "/Zc:__cplusplus", "/Zi", "/permissive-"]
defines = ["DEBUG", "_DEBUG"]
ldflags = []

[profiles.release]
cflags = ["/FS", "/MD", "/O2", "/Zc:__cplusplus", "/permissive-"]
defines = ["NDEBUG"]
ldflags = []

